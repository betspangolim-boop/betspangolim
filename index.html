<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BetStats Arena</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
color:white;
}

header{
padding:20px;
background:#0d1b2f;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.1);
}

header h1{
font-size:28px;
}

.container{
display:grid;
grid-template-columns:250px 1fr;
min-height:100vh;
}

.sidebar{
background:#0d1b2f;
padding:20px;
border-right:1px solid rgba(255,255,255,.1);
}

.sidebar button{
width:100%;
padding:12px;
margin-bottom:10px;
background:#13243d;
border:none;
border-radius:10px;
color:white;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#1d3a61;
}

.content{
padding:20px;
}

.card{
background:#10243f;
padding:20px;
border-radius:15px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.08);
}

input,select{
padding:10px;
border-radius:10px;
border:none;
background:#13243d;
color:white;
width:100%;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.fixture{
background:#13243d;
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

.fixture h3{
margin-bottom:8px;
}

.live{
color:#35d07f;
font-weight:bold;
}

.future{
color:#58a6ff;
font-weight:bold;
}

.past{
color:#ffcc66;
font-weight:bold;
}

.team{
display:flex;
justify-content:space-between;
margin-top:10px;
}

.odds{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
margin-top:10px;
}

.odd{
background:#0f2038;
padding:10px;
border-radius:10px;
text-align:center;
}

.stat{
margin-top:10px;
padding:10px;
background:#0f2038;
border-radius:10px;
}

.hidden{
display:none;
}

button.sync{
background:#35d07f;
color:black;
font-weight:bold;
}

@media(max-width:900px){
.container{
grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<header>
<div>
<h1>BetStats Arena</h1>
<p>SofaScore + AiScore + FullTBet</p>
</div>

<div>
<button class="sync" onclick="sincronizar()">Sincronizar API</button>
</div>
</header>

<div class="container">

<div class="sidebar">

<button onclick="abrir('dashboard')">Dashboard</button>

<button onclick="abrir('jogos')">Jogos</button>

<button onclick="abrir('aovivo')">Ao Vivo</button>

<button onclick="abrir('times')">Times</button>

<button onclick="abrir('odds')">Odds</button>

<button onclick="abrir('config')">Fontes/API</button>

</div>

<div class="content">

<div id="dashboard">

<div class="grid">

<div class="card">
<h2 id="totalJogos">0</h2>
<p>Jogos</p>
</div>

<div class="card">
<h2 id="aoVivo">0</h2>
<p>Ao Vivo</p>
</div>

<div class="card">
<h2 id="campeonatos">0</h2>
<p>Campeonatos</p>
</div>

</div>

<div class="card">
<h2>Próximos Jogos</h2>
<div id="proximos"></div>
</div>

</div>

<div id="jogos" class="hidden">

<div class="card">

<input type="text" id="busca" placeholder="Pesquisar time ou campeonato..." onkeyup="renderJogos()">

<div id="listaJogos"></div>

</div>

</div>

<div id="aovivo" class="hidden">

<div class="card">

<h2>Jogos Ao Vivo</h2>

<div id="listaAoVivo"></div>

</div>

</div>

<div id="times" class="hidden">

<div class="card">

<h2>Pesquisar Times</h2>

<div id="listaTimes"></div>

</div>

</div>

<div id="odds" class="hidden">

<div class="card">

<h2>Odds Exchange</h2>

<div id="listaOdds"></div>

</div>

</div>

<div id="config" class="hidden">

<div class="card">

<h2>Configuração API</h2>

<input type="text" id="apiBase" placeholder="https://betspangolim.onrender.com">

<button onclick="salvarApi()">Salvar</button>

</div>

</div>

</div>

</div>

<script>

let apiBase = localStorage.getItem("apiBase") || "";

document.getElementById("apiBase").value = apiBase;

let dados = {
jogos:[],
times:[],
odds:[]
};

function abrir(id){

document.querySelectorAll(".content > div").forEach(el=>{
el.classList.add("hidden");
});

document.getElementById(id).classList.remove("hidden");

}

function salvarApi(){

apiBase = document.getElementById("apiBase").value;

localStorage.setItem("apiBase",apiBase);

alert("API salva");

}

async function sincronizar(){

if(!apiBase){

alert("Informe a URL da API");

return;

}

try{

const req = await fetch(apiBase + "/api/dados");

const json = await req.json();

dados = json;

render();

alert("Sincronizado com sucesso");

}catch(e){

alert("Erro ao conectar API");

console.log(e);

}

}

function render(){

document.getElementById("totalJogos").innerText = dados.jogos.length;

document.getElementById("aoVivo").innerText = dados.jogos.filter(j=>j.status==="live").length;

document.getElementById("campeonatos").innerText = [...new Set(dados.jogos.map(j=>j.camp))].length;

renderJogos();

renderAoVivo();

renderTimes();

renderOdds();

renderProximos();

}

function renderProximos(){

const box = document.getElementById("proximos");

box.innerHTML = "";

dados.jogos
.filter(j=>j.status==="future")
.slice(0,5)
.forEach(j=>{

box.innerHTML += fixtureHTML(j);

});

}

function renderJogos(){

const busca = document.getElementById("busca").value.toLowerCase();

const box = document.getElementById("listaJogos");

box.innerHTML = "";

dados.jogos
.filter(j=>{

return (
j.casa.toLowerCase().includes(busca) ||
j.fora.toLowerCase().includes(busca) ||
j.camp.toLowerCase().includes(busca)
);

})
.forEach(j=>{

box.innerHTML += fixtureHTML(j);

});

}

function renderAoVivo(){

const box = document.getElementById("listaAoVivo");

box.innerHTML = "";

dados.jogos
.filter(j=>j.status==="live")
.forEach(j=>{

box.innerHTML += fixtureHTML(j);

});

}

function renderTimes(){

const box = document.getElementById("listaTimes");

box.innerHTML = "";

dados.times.forEach(t=>{

box.innerHTML += `
<div class="fixture">
<h3>${t.nome}</h3>
<p>${t.pais}</p>
<div class="stat">Forma: ${t.forma}%</div>
<div class="stat">Over 2.5: ${t.over25}%</div>
</div>
`;

});

}

function renderOdds(){

const box = document.getElementById("listaOdds");

box.innerHTML = "";

dados.odds.forEach(o=>{

box.innerHTML += `
<div class="fixture">
<h3>${o.jogo}</h3>

<div class="odds">

<div class="odd">
Casa
<br>
${o.back.casa}
</div>

<div class="odd">
Empate
<br>
${o.back.empate}
</div>

<div class="odd">
Fora
<br>
${o.back.fora}
</div>

</div>

</div>
`;

});

}

function fixtureHTML(j){

let statusClass = "";

if(j.status==="live") statusClass = "live";
if(j.status==="future") statusClass = "future";
if(j.status==="past") statusClass = "past";

return `
<div class="fixture">

<h3>${j.camp}</h3>

<p class="${statusClass}">
${j.status.toUpperCase()}
</p>

<div class="team">
<span>${j.casa}</span>
<span>${j.placar}</span>
<span>${j.fora}</span>
</div>

<div class="stat">
Over 2.5: ${j.stats.over25}%
</div>

<div class="stat">
BTTS: ${j.stats.btts}%
</div>

</div>
`;

}

</script>

</body>
</html>
