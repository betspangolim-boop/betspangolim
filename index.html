<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BetStats Arena Live</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
color:white;
}

header{
background:#0d1b2f;
padding:18px 25px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid rgba(255,255,255,.1);
position:sticky;
top:0;
z-index:10;
}

header h1{
font-size:28px;
}

header p{
font-size:13px;
opacity:.7;
margin-top:4px;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
min-height:100vh;
}

.sidebar{
background:#0d1b2f;
padding:20px;
border-right:1px solid rgba(255,255,255,.08);
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:10px;
background:#13243d;
border:none;
border-radius:12px;
color:white;
cursor:pointer;
font-size:15px;
transition:.2s;
}

.sidebar button:hover{
background:#1d3a61;
}

.content{
padding:20px;
}

.card{
background:#10243f;
padding:20px;
border-radius:16px;
margin-bottom:20px;
border:1px solid rgba(255,255,255,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
}

.metric{
background:#13243d;
padding:20px;
border-radius:14px;
}

.metric h2{
font-size:32px;
margin-bottom:8px;
}

.metric p{
opacity:.7;
}

input{
padding:12px;
border:none;
border-radius:12px;
background:#13243d;
color:white;
width:100%;
margin-bottom:15px;
}

.fixture{
background:#13243d;
padding:18px;
border-radius:14px;
margin-bottom:15px;
}

.fixture h3{
margin-bottom:8px;
font-size:16px;
}

.status{
font-size:13px;
margin-bottom:12px;
font-weight:bold;
}

.live{
color:#35d07f;
}

.future{
color:#58a6ff;
}

.past{
color:#ffcc66;
}

.match{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
font-size:18px;
font-weight:bold;
}

.team{
width:40%;
}

.score{
width:20%;
text-align:center;
font-size:22px;
}

.stats{
margin-top:15px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.stat{
background:#0d1b2f;
padding:10px;
border-radius:10px;
font-size:13px;
}

.sync{
background:#35d07f;
color:black;
font-weight:bold;
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
}

.hidden{
display:none;
}

.live-indicator{
position:fixed;
right:15px;
bottom:15px;
background:#0d1b2f;
padding:12px 15px;
border-radius:12px;
border:1px solid rgba(255,255,255,.08);
font-size:13px;
z-index:999;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.sidebar{
display:flex;
overflow:auto;
gap:10px;
}

.sidebar button{
min-width:180px;
margin-bottom:0;
}

}

</style>
</head>

<body>

<header>

<div>
<h1>BetStats Arena Live</h1>
<p>SofaScore • AiScore • API-Football • FullTBet</p>
</div>

<button class="sync" onclick="sincronizar()">
Sincronizar Agora
</button>

</header>

<div class="container">

<div class="sidebar">

<button onclick="abrir('dashboard')">Dashboard</button>

<button onclick="abrir('aovivo')">Ao Vivo</button>

<button onclick="abrir('jogos')">Todos os Jogos</button>

<button onclick="abrir('times')">Times</button>

<button onclick="abrir('config')">Configuração API</button>

</div>

<div class="content">

<div id="dashboard">

<div class="grid">

<div class="metric">
<h2 id="totalJogos">0</h2>
<p>Total de Jogos</p>
</div>

<div class="metric">
<h2 id="jogosAoVivo">0</h2>
<p>Jogos Ao Vivo</p>
</div>

<div class="metric">
<h2 id="totalCampeonatos">0</h2>
<p>Campeonatos</p>
</div>

</div>

<div class="card">

<h2 style="margin-bottom:15px;">
Jogos Ao Vivo
</h2>

<div id="liveDashboard"></div>

</div>

</div>

<div id="aovivo" class="hidden">

<div class="card">

<h2 style="margin-bottom:15px;">
Partidas Ao Vivo
</h2>

<div id="listaAoVivo"></div>

</div>

</div>

<div id="jogos" class="hidden">

<div class="card">

<input
type="text"
id="busca"
placeholder="Pesquisar time ou campeonato..."
onkeyup="renderJogos()"
>

<div id="listaJogos"></div>

</div>

</div>

<div id="times" class="hidden">

<div class="card">

<h2 style="margin-bottom:15px;">
Times
</h2>

<div id="listaTimes"></div>

</div>

</div>

<div id="config" class="hidden">

<div class="card">

<h2 style="margin-bottom:15px;">
Configuração API
</h2>

<input
type="text"
id="apiBase"
placeholder="https://betspangolim.onrender.com"
>

<button class="sync" onclick="salvarApi()">
Salvar API
</button>

</div>

</div>

</div>

</div>

<div class="live-indicator" id="liveStatus">
🔴 AO VIVO
</div>

<script>

let dados = {
jogos:[]
};

let apiBase =
localStorage.getItem("apiBase") || "";

document.getElementById("apiBase").value =
apiBase;

// ==========================
// ABRIR TELAS
// ==========================

function abrir(id){

document
.querySelectorAll(".content > div")
.forEach(el=>{

el.classList.add("hidden");

});

document
.getElementById(id)
.classList.remove("hidden");

}

// ==========================
// SALVAR API
// ==========================

function salvarApi(){

apiBase =
document.getElementById("apiBase").value;

localStorage.setItem("apiBase",apiBase);

alert("API salva");

}

// ==========================
// SINCRONIZAR
// ==========================

let sincronizando = false;

async function sincronizar(){

if(sincronizando) return;

sincronizando = true;

try{

if(!apiBase){

sincronizando = false;

return;

}

const req = await fetch(

apiBase + "/api/dados?t=" + Date.now(),

{
cache:"no-store"
}

);

const json = await req.json();

dados = json;

render();

document.getElementById("liveStatus")
.innerHTML = `
🔴 AO VIVO<br>
${new Date().toLocaleTimeString()}
`;

}catch(e){

console.log(e);

}

sincronizando = false;

}

// ==========================
// RENDER
// ==========================

function render(){

const jogos =
dados.jogos || [];

document.getElementById("totalJogos")
.innerText = jogos.length;

document.getElementById("jogosAoVivo")
.innerText =
jogos.filter(j=>j.status==="live").length;

document.getElementById("totalCampeonatos")
.innerText =
[...new Set(jogos.map(j=>j.camp))].length;

renderAoVivo();

renderJogos();

renderTimes();

}

// ==========================
// AO VIVO
// ==========================

function renderAoVivo(){

const live =
dados.jogos.filter(j=>j.status==="live");

const html =
live.map(j=>fixtureHTML(j)).join("");

document.getElementById("listaAoVivo")
.innerHTML = html;

document.getElementById("liveDashboard")
.innerHTML = html;

}

// ==========================
// JOGOS
// ==========================

function renderJogos(){

const busca =
document.getElementById("busca")
? document.getElementById("busca").value.toLowerCase()
: "";

const html =
dados.jogos
.filter(j=>{

return (
j.casa.toLowerCase().includes(busca) ||
j.fora.toLowerCase().includes(busca) ||
j.camp.toLowerCase().includes(busca)
);

})
.map(j=>fixtureHTML(j))
.join("");

document.getElementById("listaJogos")
.innerHTML = html;

}

// ==========================
// TIMES
// ==========================

function renderTimes(){

const times = {};

dados.jogos.forEach(j=>{

times[j.casa] = true;
times[j.fora] = true;

});

document.getElementById("listaTimes")
.innerHTML = Object.keys(times)
.map(t=>`

<div class="fixture">

<h3>${t}</h3>

<p>
Time monitorado em tempo real
</p>

</div>

`)
.join("");

}

// ==========================
// HTML JOGO
// ==========================

function fixtureHTML(j){

let statusClass = "";

if(j.status==="live") statusClass = "live";
if(j.status==="future") statusClass = "future";
if(j.status==="past") statusClass = "past";

return `

<div class="fixture">

<h3>
${j.camp}
</h3>

<div class="status ${statusClass}">
${j.status.toUpperCase()}
${j.min ? " • " + j.min + "'" : ""}
</div>

<div class="match">

<div class="team">
${j.casa}
</div>

<div class="score">
${j.placar}
</div>

<div class="team" style="text-align:right;">
${j.fora}
</div>

</div>

<div class="stats">

<div class="stat">
Over 2.5: ${j.stats?.over25 || 0}%
</div>

<div class="stat">
BTTS: ${j.stats?.btts || 0}%
</div>

</div>

</div>

`;

}

// ==========================
// AUTO UPDATE
// ==========================

sincronizar();

setInterval(()=>{

sincronizar();

},5000);

</script>

</body>
</html>
