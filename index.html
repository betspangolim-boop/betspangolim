<script>

// ===============================
// BETSTATS AUTO LIVE SYNC SYSTEM
// ===============================

let sincronizando = false;
let ultimaAtualizacao = null;

// sincronização principal
async function sincronizar() {

    if (sincronizando) return;

    sincronizando = true;

    try {

        const apiBase = localStorage.getItem("apiBase");

        if (!apiBase) {
            console.log("API não configurada");
            sincronizando = false;
            return;
        }

        // indicador visual
        const btn = document.querySelector(".sync");
        if (btn) {
            btn.innerText = "Atualizando...";
            btn.style.opacity = "0.7";
        }

        // timestamp para evitar cache
        const timestamp = new Date().getTime();

        // buscar backend
        const response = await fetch(
            apiBase + "/api/dados?t=" + timestamp,
            {
                cache: "no-store",
                headers: {
                    "Cache-Control": "no-cache"
                }
            }
        );

        if (!response.ok) {
            throw new Error("Erro backend");
        }

        const json = await response.json();

        // atualizar memória
        dados = json;

        // renderizar sistema
        render();

        // salvar hora
        ultimaAtualizacao = new Date();

        // mostrar hora atualização
        atualizarRodape();

        console.log("Atualizado:", ultimaAtualizacao);

    } catch (e) {

        console.log("Erro sincronização:", e);

    } finally {

        sincronizando = false;

        const btn = document.querySelector(".sync");

        if (btn) {
            btn.innerText = "Sincronizar agora";
            btn.style.opacity = "1";
        }

    }

}

// ===============================
// STATUS RODAPÉ
// ===============================

function atualizarRodape() {

    let status = document.getElementById("liveStatus");

    if (!status) {

        status = document.createElement("div");

        status.id = "liveStatus";

        status.style.position = "fixed";
        status.style.right = "15px";
        status.style.bottom = "15px";
        status.style.background = "#07111f";
        status.style.border = "1px solid rgba(255,255,255,.1)";
        status.style.padding = "10px 15px";
        status.style.borderRadius = "10px";
        status.style.color = "#35d07f";
        status.style.fontSize = "13px";
        status.style.zIndex = "9999";

        document.body.appendChild(status);

    }

    status.innerHTML = `
        🔴 AO VIVO<br>
        Atualizado: ${ultimaAtualizacao.toLocaleTimeString()}
    `;

}

// ===============================
// AUTO UPDATE 5 SEGUNDOS
// ===============================

// sincroniza ao abrir
sincronizar();

// atualiza a cada 5 segundos
setInterval(() => {

    sincronizar();

}, 5000);

// ===============================
// ATUALIZAÇÃO AO VOLTAR ABA
// ===============================

document.addEventListener("visibilitychange", () => {

    if (!document.hidden) {

        sincronizar();

    }

});

// ===============================
// RECONECTAR INTERNET
// ===============================

window.addEventListener("online", () => {

    sincronizar();

});

// ===============================
// HOT RELOAD JOGOS AO VIVO
// ===============================

setInterval(() => {

    if (dados && dados.jogos) {

        const live = dados.jogos.filter(j => j.status === "live");

        document.title = `(${live.length}) Jogos Ao Vivo • BetStats`;

    }

}, 2000);

</script>
